name:  Atualizar Dados Transferegov

on:
  schedule:
    - cron: "0 5 * * 1"   # toda segunda-feira às 05h UTC (02h Brasília)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  extrair-dados:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # segurança — encerra se travar

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pandas python-dotenv

      - name: Executar extração
        env:
          URL_fundo_a_fundo:    ${{ secrets.URL_FUNDO_A_FUNDO }}
          URL_transf_especial:  ${{ secrets.URL_TRANSF_ESPECIAL }}
        run: python api.py

      - name: Commit e push dos CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundo_a_fundo.csv emendas_to.csv
          git diff --cached --quiet \
            || git commit -m "🤖 [AUTO] Dados atualizados em $(date +'%d/%m/%Y %H:%M')"
          git push
