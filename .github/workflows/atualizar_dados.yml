name: Atualizar Dados

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Extrair fundo a fundo e transferências especiais
        env:
          URL_FUNDO_A_FUNDO: ${{ secrets.URL_FUNDO_A_FUNDO }}
          URL_TRANSF_ESPECIAL: ${{ secrets.URL_TRANSF_ESPECIAL }}
        run: python api.py

      - name: Executar ETL discricionárias
        run: python coletor_discricionarias.py

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundo_a_fundo.csv emendas_to.csv cache_natureza.json data_discricionarias/processados/discricionarias_to.parquet
          git diff --cached --quiet && echo "Nenhuma mudança nos dados." || git commit -m "🤖 Atualiza bases automáticas"
          git push
